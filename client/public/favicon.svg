<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 130 130">
  <defs>
    <!-- Vibrant Gradient -->
    <linearGradient id="camGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" /> <!-- Indigo 400 -->
      <stop offset="50%" stop-color="#a855f7" /> <!-- Purple 500 -->
      <stop offset="100%" stop-color="#d946ef" /> <!-- Fuchsia 500 -->
    </linearGradient>
    
    <!-- Subtle Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <g filter="url(#glow)">
    <!-- Main Camera Body -->
    <rect x="8" y="24" width="60" height="52" rx="14" fill="url(#camGrad)" />
    
    <!-- Camera Lens Outer Ring -->
    <circle cx="38" cy="50" r="16" fill="#1e1b4b" opacity="0.5" />
    <!-- Camera Lens Inner -->
    <circle cx="38" cy="50" r="12" fill="#312e81" />
    <!-- Lens Reflection (Glass effect) -->
    <circle cx="42" cy="46" r="4" fill="white" opacity="0.9" />
    
    <!-- Camera Flap (Right side) -->
    <path d="M72 38L94 26C96.5 24.6 98 26 98 29V71C98 74 96.5 75.4 94 74L72 62" fill="url(#camGrad)" />
  </g>
</svg>
